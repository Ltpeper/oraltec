<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Oraltec — Klantdashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0c10; font-family: 'Inter', system-ui, sans-serif; }

  /* Dark tokens (default) */
  .ot-root[data-theme="dark"] {
    --ot-surface-0: oklch(14% 0.006 240);
    --ot-surface-1: oklch(17% 0.006 240);
    --ot-surface-2: oklch(21% 0.007 240);
    --ot-surface-3: oklch(26% 0.008 240);
    --ot-border-soft: oklch(22% 0.006 240);
    --ot-border:      oklch(27% 0.008 240);
    --ot-border-strong: oklch(35% 0.01 240);

    --ot-fg:        oklch(96% 0.004 240);
    --ot-fg-soft:   oklch(80% 0.005 240);
    --ot-fg-muted:  oklch(58% 0.008 240);

    --ot-accent:        oklch(68% 0.14 220);
    --ot-accent-strong: oklch(78% 0.14 220);
    --ot-accent-soft:   oklch(30% 0.08 220);

    --ot-ok:        oklch(70% 0.11 160);
    --ot-ok-strong: oklch(80% 0.11 160);
    --ot-ok-soft:   oklch(28% 0.06 160);
  }

  /* Light tokens */
  .ot-root[data-theme="light"] {
    --ot-surface-0: oklch(99% 0.002 240);
    --ot-surface-1: oklch(100% 0 0);
    --ot-surface-2: oklch(96% 0.004 240);
    --ot-surface-3: oklch(92% 0.005 240);
    --ot-border-soft: oklch(94% 0.004 240);
    --ot-border:      oklch(90% 0.006 240);
    --ot-border-strong: oklch(80% 0.008 240);

    --ot-fg:        oklch(20% 0.012 240);
    --ot-fg-soft:   oklch(38% 0.012 240);
    --ot-fg-muted:  oklch(55% 0.012 240);

    --ot-accent:        oklch(52% 0.15 220);
    --ot-accent-strong: oklch(42% 0.15 220);
    --ot-accent-soft:   oklch(94% 0.04 220);

    --ot-ok:        oklch(55% 0.13 160);
    --ot-ok-strong: oklch(42% 0.13 160);
    --ot-ok-soft:   oklch(94% 0.04 160);
  }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 1000;
    background: rgba(20, 22, 28, 0.95); color: #fff;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 14px; min-width: 220px; font-size: 12px;
    backdrop-filter: blur(12px); display: none;
    font-family: 'Inter', system-ui, sans-serif;
    box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
  }
  .tweaks-panel.active { display: block; }
  .tweaks-panel h4 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 500; }
  .tweaks-seg { display: flex; gap: 2px; background: rgba(255,255,255,0.06);
    border-radius: 7px; padding: 3px; }
  .tweaks-seg button { all: unset; flex: 1; text-align: center; padding: 6px 10px;
    border-radius: 5px; cursor: pointer; font-size: 12px; color: rgba(255,255,255,0.6); }
  .tweaks-seg button.active { background: rgba(255,255,255,0.12); color: #fff; }
</style>
</head>
<body>

<div id="root"></div>

<div class="tweaks-panel" id="tweaks">
  <h4>Tweaks</h4>
  <div style="margin-bottom: 6px; color: rgba(255,255,255,0.7);">Thema</div>
  <div class="tweaks-seg" id="theme-seg">
    <button data-theme="light">Light</button>
    <button data-theme="dark" class="active">Dark</button>
  </div>
</div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark"
  }/*EDITMODE-END*/;

  window.__tweaks = { ...TWEAK_DEFAULTS };

  function applyTheme(theme) {
    window.__tweaks.theme = theme;
    document.querySelectorAll('.ot-root').forEach(el => el.setAttribute('data-theme', theme));
    document.querySelectorAll('#theme-seg button').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === theme);
    });
    document.body.style.background = theme === 'light' ? '#f4f5f7' : '#0a0c10';
  }

  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('active');
    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('active');
  });

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('theme-seg').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-theme]');
      if (!btn) return;
      applyTheme(btn.dataset.theme);
      try {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: btn.dataset.theme } }, '*');
      } catch(_) {}
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  });
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="direction1.jsx"></script>
<script type="text/babel" src="direction2.jsx"></script>
<script type="text/babel" src="direction3.jsx"></script>

<script type="text/babel">
  const theme = window.__tweaks.theme;

  // Observe new .ot-root nodes and apply theme
  const obs = new MutationObserver(() => {
    document.querySelectorAll('.ot-root:not([data-theme])').forEach(el => {
      el.setAttribute('data-theme', window.__tweaks.theme);
    });
  });
  obs.observe(document.body, { childList: true, subtree: true });

  function App() {
    return (
      <DesignCanvas title="Oraltec Klantdashboard" subtitle="3 richtingen — bestellingen & nabestellen voor orthodontiepraktijken">
        <DCSection id="directions" title="Dashboardrichtingen">
          <DCArtboard id="dir1" label="1 — Klassiek enterprise" width={1280} height={820}>
            <Direction1 />
          </DCArtboard>
          <DCArtboard id="dir2" label="2 — Product-forward" width={1280} height={820}>
            <Direction2 />
          </DCArtboard>
          <DCArtboard id="dir3" label="3 — Operationeel & planning" width={1280} height={820}>
            <Direction3 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // Re-apply on load
  setTimeout(() => applyTheme(window.__tweaks.theme), 100);
  setTimeout(() => applyTheme(window.__tweaks.theme), 500);
  setTimeout(() => applyTheme(window.__tweaks.theme), 1500);
</script>

</body>
</html>
